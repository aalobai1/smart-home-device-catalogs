<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Command Central · Matter</title>
<style>
  :root {
    --bg: #0a0c10; --panel: #12161d; --panel-2: #161b24; --line: #232a35;
    --ink: #e7ecf3; --muted: #8a94a6; --accent: #5b8cff; --on: #3ad29f; --off: #4a5263;
    --warn: #ffb454;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(1200px 600px at 70% -10%, #16202e 0%, var(--bg) 55%);
    color: var(--ink); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 14px; padding: 22px 28px; border-bottom: 1px solid var(--line);
  }
  .logo {
    width: 34px; height: 34px; border-radius: 9px; flex: none;
    background: conic-gradient(from 210deg, var(--accent), var(--on), var(--warn), var(--accent));
    box-shadow: 0 0 0 1px #ffffff14, 0 8px 24px #5b8cff33;
  }
  h1 { font-size: 17px; margin: 0; letter-spacing: .2px; font-weight: 650; }
  .sub { color: var(--muted); font-size: 12.5px; }
  .pill {
    margin-left: auto; display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px;
    color: var(--muted); padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; background: var(--panel);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--off); }
  .dot.live { background: var(--on); box-shadow: 0 0 0 3px #3ad29f22; }
  main { padding: 26px 28px; max-width: 1080px; margin: 0 auto; }
  .bar {
    display: flex; gap: 10px; align-items: center; margin-bottom: 22px; flex-wrap: wrap;
  }
  input[type=text] {
    flex: 1; min-width: 220px; background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    padding: 11px 14px; border-radius: 10px; font: inherit; letter-spacing: .5px;
  }
  input::placeholder { color: #5b6577; letter-spacing: 0; }
  button {
    background: var(--accent); color: #061026; border: 0; font: inherit; font-weight: 600;
    padding: 11px 16px; border-radius: 10px; cursor: pointer;
  }
  button.ghost { background: var(--panel); color: var(--ink); border: 1px solid var(--line); }
  button:disabled { opacity: .5; cursor: default; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card {
    background: linear-gradient(180deg, var(--panel-2), var(--panel)); border: 1px solid var(--line);
    border-radius: 16px; padding: 18px; display: flex; flex-direction: column; gap: 14px;
  }
  .card .top { display: flex; align-items: flex-start; gap: 12px; }
  .icn {
    width: 42px; height: 42px; border-radius: 11px; flex: none; display: grid; place-items: center;
    background: #1c2430; border: 1px solid var(--line); font-size: 20px;
  }
  .name { font-weight: 640; }
  .vendor { color: var(--muted); font-size: 12.5px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 11.5px; color: #aeb9cc; background: #1a2230; border: 1px solid var(--line); padding: 3px 9px; border-radius: 999px; }
  .meta { font-size: 11.5px; color: #66708a; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .ctrls { display: flex; flex-direction: column; gap: 9px; margin-top: auto; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px;
         background: #0e131b; border: 1px solid var(--line); border-radius: 11px; padding: 9px 12px; }
  .state { font-size: 12.5px; color: var(--muted); }
  .state b { color: var(--on); }
  .state.off b { color: var(--off); }
  .toggle {
    width: 50px; height: 28px; border-radius: 999px; background: #2a3240; position: relative;
    cursor: pointer; transition: background .18s; flex: none; border: 0;
  }
  .toggle.on { background: var(--on); }
  .knob { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%;
          background: #fff; transition: left .18s; }
  .toggle.on .knob { left: 25px; }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; border: 1px dashed var(--line); border-radius: 16px; }
  .empty h3 { color: var(--ink); margin: 0 0 6px; }
  code { background: #0e131b; border: 1px solid var(--line); padding: 1px 6px; border-radius: 6px; font-size: 12.5px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
           background: #1b2230; border: 1px solid var(--line); padding: 11px 16px; border-radius: 10px;
           font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .unavail { opacity: .55; }
  .sec { font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted);
         margin: 28px 0 12px; font-weight: 600; }
  .disco { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 18px; }
  .disco-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .disco-title { font-weight: 640; }
  .disco-sub { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
  .stat { display: flex; gap: 20px; }
  .stat b { font-size: 22px; font-weight: 700; display: block; line-height: 1.1; }
  .stat span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
  .fabrics { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .fab { display: flex; align-items: center; gap: 12px; padding: 11px 13px; border-radius: 11px;
         background: #0e131b; border: 1px solid var(--line); }
  .fab.mine { border-color: #2e6b54; background: #0e1a16; }
  .fab .fdot { width: 9px; height: 9px; border-radius: 50%; background: var(--warn); flex: none; }
  .fab.mine .fdot { background: var(--on); }
  .fab .fmain { flex: 1; min-width: 0; }
  .fab .fname { font-size: 13px; font-weight: 600; }
  .fab .fid { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #66708a; }
  .fab .fcount { font-size: 12.5px; color: var(--muted); white-space: nowrap; }
  .tag { font-size: 10.5px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .tag.you { background: #14352a; color: var(--on); }
  .tag.other { background: #3a2f17; color: var(--warn); }
  .spin { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<header>
  <div class="logo"></div>
  <div>
    <h1>Command Central</h1>
    <div class="sub">A unified view of every Matter device on your fabric</div>
  </div>
  <div class="pill"><span class="dot" id="dot"></span><span id="status">connecting…</span></div>
</header>

<main>
  <div class="bar">
    <input id="code" type="text" placeholder="Pairing code from device app (e.g. 1234-567-8901)" />
    <button id="add">Add device</button>
    <button id="refresh" class="ghost">Refresh</button>
  </div>
  <section id="discovery"></section>
  <h2 class="sec">On your fabric</h2>
  <div id="view"></div>
</main>

<div class="toast" id="toast"></div>

<script>
const ICONS = {
  "On/Off Light": "💡", "Dimmable Light": "💡", "Color Temperature Light": "💡",
  "Extended Color Light": "🌈", "On/Off Plug": "🔌", "Dimmable Plug": "🔌",
  "Door Lock": "🔒", "Window Covering": "🪟", "Thermostat": "🌡️",
  "Temperature Sensor": "🌡️", "Contact Sensor": "🚪", "Occupancy Sensor": "🚶",
  "Fan": "🌀", "Air Purifier": "🫧", "Air Quality Sensor": "🫧",
  "Robotic Vacuum": "🤖", "Smoke/CO Alarm": "🚨", "Camera": "📷",
  "EV Charger (EVSE)": "🔋", "Generic Switch": "🎛️", "Water Leak Detector": "💧",
};
const iconFor = (types) => { for (const t of types) if (ICONS[t]) return ICONS[t]; return "📟"; };

const toast = (msg) => {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 2600);
};

async function api(path, body) {
  const r = await fetch(path, body ? { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) } : {});
  return r.json();
}

let busy = false;
async function toggle(nodeId, endpoint) {
  if (busy) return; busy = true;
  const r = await api("/api/toggle", { nodeId, endpoint });
  busy = false;
  if (r.error) toast("⚠︎ " + r.error); else { toast("Sent"); setTimeout(render, 350); }
}

async function add() {
  const code = document.getElementById("code").value.trim();
  if (!code) return toast("Enter a pairing code");
  const btn = document.getElementById("add"); btn.disabled = true; btn.textContent = "Commissioning…";
  const r = await api("/api/commission", { code });
  btn.disabled = false; btn.textContent = "Add device";
  if (r.error) toast("⚠︎ " + r.error);
  else { toast("Device added to fabric ✓"); document.getElementById("code").value = ""; render(); }
}

function deviceCard(d) {
  const onoff = d.controls.find((c) => c.kind === "onoff");
  const ctrl = onoff ? `
    <div class="row">
      <span class="state ${onoff.on ? "" : "off"}">Power <b>${onoff.on ? "ON" : "OFF"}</b>${onoff.level != null ? " · " + onoff.level + "%" : ""}</span>
      <button class="toggle ${onoff.on ? "on" : ""}" onclick="toggle(${d.nodeId}, ${onoff.endpoint})"><span class="knob"></span></button>
    </div>` : `<div class="row"><span class="state">No on/off control exposed</span></div>`;
  return `
    <div class="card ${d.available ? "" : "unavail"}">
      <div class="top">
        <div class="icn">${iconFor(d.types)}</div>
        <div style="min-width:0">
          <div class="name">${esc(d.product)}</div>
          <div class="vendor">${esc(d.vendor)}${d.available ? "" : " · offline"}</div>
        </div>
      </div>
      <div class="chips">${d.types.map((t) => `<span class="chip">${esc(t)}</span>`).join("")}</div>
      <div class="meta">node ${d.nodeId} · VID 0x${(d.vendorId||0).toString(16)} / PID 0x${(d.productId||0).toString(16)}</div>
      <div class="ctrls">${ctrl}</div>
    </div>`;
}

const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

async function render() {
  const s = await api("/api/state");
  const dot = document.getElementById("dot"), status = document.getElementById("status");
  if (s.connected) { dot.classList.add("live"); status.textContent = `controller online · fabric ${s.controller.fabricId}`; }
  else { dot.classList.remove("live"); status.textContent = "controller offline"; }

  const view = document.getElementById("view");
  if (!s.devices.length) {
    view.innerHTML = `<div class="empty">
      <h3>No devices on your fabric yet</h3>
      <p>Open a device in its current app (Apple Home, Google Home, SmartThings…), choose<br>
      <b>“Add to another platform / Turn on pairing mode”</b>, and paste the code above.</p>
      <p class="sub">${s.connected ? "Controller is online and ready to commission." : "Waiting for the Matter controller…"}</p>
    </div>`;
    return;
  }
  view.innerHTML = `<div class="grid">${s.devices.map(deviceCard).join("")}</div>`;
}

function renderDiscovery(d) {
  const el = document.getElementById("discovery");
  if (d.error) { el.innerHTML = `<div class="disco"><span class="spin">Discovery unavailable: ${esc(d.error)}</span></div>`; return; }
  const fabs = d.fabrics.map((f) => {
    const mine = f.mine;
    const n = (mine ? f.deviceNodes : f.nodes).length;
    return `<div class="fab ${mine ? "mine" : ""}">
      <span class="fdot"></span>
      <div class="fmain">
        <div class="fname">${mine ? "Your fabric (this controller)" : "Another ecosystem"} ${mine ? '<span class="tag you">YOU</span>' : '<span class="tag other">UNIDENTIFIED</span>'}</div>
        <div class="fid">fabric ${esc(f.fabric)}</div>
      </div>
      <div class="fcount">${mine ? (n ? n + " device" + (n>1?"s":"") : "controller only") : n + " device" + (n>1?"s":"") + " · can't read yet"}</div>
    </div>`;
  }).join("");
  el.innerHTML = `<div class="disco">
    <div class="disco-head">
      <div>
        <div class="disco-title">Discovered on this network <span class="spin" id="rescan-status"></span></div>
        <div class="disco-sub">Passive mDNS scan — sees every Matter device on the LAN, no fabric access needed. Devices on other ecosystems show up but stay unidentified until commissioned to your fabric.</div>
      </div>
      <div class="stat">
        <div><b>${d.fabricsTotal}</b><span>fabrics</span></div>
        <div><b>${d.foreignDevices}</b><span>not yours</span></div>
        <div><b>${d.commissionableCount}</b><span>pairing now</span></div>
      </div>
    </div>
    <div class="fabrics">${fabs || '<span class="spin">No Matter devices seen.</span>'}</div>
  </div>`;
}

async function rescan() {
  const s = document.getElementById("rescan-status");
  if (s) s.textContent = "· scanning…";
  try { renderDiscovery(await api("/api/discover")); }
  catch (e) { renderDiscovery({ error: e.message }); }
}

document.getElementById("add").onclick = add;
document.getElementById("refresh").onclick = () => { render(); rescan(); };
document.getElementById("code").addEventListener("keydown", (e) => { if (e.key === "Enter") add(); });
render();
rescan();
setInterval(render, 4000);
setInterval(rescan, 20000); // re-scan the network periodically
</script>
</body>
</html>
